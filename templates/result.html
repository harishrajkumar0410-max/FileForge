<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Conversion Complete | FileForge</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="background">

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

</div>

<section class="hero">

    <h1>✅ Conversion Complete</h1>

    <p>Your PDF is ready to download.</p>

    <br><br>

    {% if original_size %}

<div class="stats-card">

    <h3>Compression Result</h3>

    <p><strong>Original:</strong> {{ original_size }} MB</p>

    <p><strong>Compressed:</strong> {{ compressed_size }} MB</p>

    <p><strong>Saved:</strong> {{ saved_percent }}%</p>

</div>

{% endif %}

    <a href="/download-file">
    <button class="premium-btn">
        Download File
    </button>
</a>

    <br><br>

    <a href="/image-to-pdf">
        <button class="login-btn">

            Convert Another File

        </button>
    </a>

</section>

</body>

</html>
